<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17025 Kalite Yönetim Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg: #07091A;
  --bg2: #0D1128;
  --bg3: #111830;
  --card: #131929;
  --card2: #181F35;
  --border: rgba(99,120,200,0.12);
  --border2: rgba(99,120,200,0.22);
  --text: #E8ECF8;
  --text2: #8B94B8;
  --text3: #5A6490;
  --primary: #4F6BF0;
  --primary2: #7B5EF8;
  --accent: #00D4AA;
  --danger: #F05252;
  --warn: #F0A050;
  --success: #22C97A;
  --sidebar-w: 240px;
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,.logo-text,.section-title{font-family:'Syne',sans-serif}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* SIDEBAR */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:.3s}
.sidebar-header{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.logo-text span{color:var(--primary);font-size:10px;font-weight:500;display:block}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:var(--radius-sm);margin:1px 8px;transition:.15s;font-size:13.5px;font-weight:500;color:var(--text2);position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(79,107,240,.18),rgba(123,94,248,.08));color:var(--primary);border-left:2px solid var(--primary)}
.nav-item .nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-item .chevron{margin-left:auto;transition:.2s;width:14px;height:14px}
.nav-item.open .chevron{transform:rotate(90deg)}
.sub-nav{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sub-nav.open{max-height:200px}
.sub-nav .nav-item{padding-left:36px;font-size:12.5px}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3)}

/* MAIN */
#main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
#topbar{height:58px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;position:sticky;top:0;z-index:90}
.page-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.topbar-search{flex:1;max-width:360px;position:relative}
.topbar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px 7px 34px;font-size:13px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-search input:focus{border-color:var(--primary)}
.topbar-search .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:15px;height:15px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#content{flex:1;padding:24px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-sm{padding:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:.2s}
.kpi-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;opacity:.08;background:var(--c,var(--primary));transform:translate(25px,-25px)}
.kpi-label{font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:500}
.kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text)}
.kpi-icon{position:absolute;right:16px;top:16px;color:var(--c,var(--primary));opacity:.6}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:'DM Sans',sans-serif}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-danger{background:rgba(240,82,82,.15);border:1px solid rgba(240,82,82,.3);color:var(--danger)}
.btn-danger:hover{background:rgba(240,82,82,.25)}
.btn-success{background:rgba(34,201,122,.12);border:1px solid rgba(34,201,122,.25);color:var(--success)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600}
.badge-blue{background:rgba(79,107,240,.15);color:#7B9FF5;border:1px solid rgba(79,107,240,.2)}
.badge-purple{background:rgba(123,94,248,.15);color:#A78BFF;border:1px solid rgba(123,94,248,.2)}
.badge-green{background:rgba(34,201,122,.12);color:var(--success);border:1px solid rgba(34,201,122,.2)}
.badge-amber{background:rgba(240,160,80,.12);color:var(--warn);border:1px solid rgba(240,160,80,.2)}
.badge-red{background:rgba(240,82,82,.12);color:var(--danger);border:1px solid rgba(240,82,82,.2)}
.badge-gray{background:rgba(139,148,184,.1);color:var(--text3);border:1px solid var(--border)}
.badge-teal{background:rgba(0,212,170,.1);color:var(--accent);border:1px solid rgba(0,212,170,.2)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.tb-search{position:relative;flex:1;min-width:200px}
.tb-search input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px 8px 34px;font-size:13px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif}
.tb-search input::placeholder{color:var(--text3)}
.tb-search input:focus{border-color:var(--primary)}
.tb-search .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);width:14px;height:14px}
.tb-select{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--text);outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.tb-select:focus{border-color:var(--primary)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--card2);padding:10px 14px;text-align:left;font-size:11.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:.12s}
tbody tr:hover{background:rgba(79,107,240,.04)}
tbody tr:last-child{border-bottom:none}
td{padding:11px 14px;color:var(--text2);vertical-align:middle}
td.strong{color:var(--text);font-weight:500}
.action-btns{display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
.icon-btn{width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:.15s}
.icon-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.icon-btn.danger:hover{background:rgba(240,82,82,.12);color:var(--danger);border-color:rgba(240,82,82,.3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(7,9,26,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;transform:translateY(20px);transition:.25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal.modal-lg{max-width:820px}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.modal-close{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:.15s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:80px}
.form-group select option{background:var(--card)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:18px}
.tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);transition:.15s}
.tab.active{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tab-content{display:none}
.tab-content.active{display:block}

/* PROGRESS BAR (EN score) */
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;min-width:50px}
.progress-fill{height:100%;border-radius:99px;transition:.4s}
.en-value{font-size:12px;font-weight:600;min-width:28px}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;min-width:280px;max-width:360px;animation:slideIn .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(34,201,122,.3);color:var(--success)}
.toast.error{border-color:rgba(240,82,82,.3);color:var(--danger)}
.toast.info{border-color:rgba(79,107,240,.3);color:#7B9FF5}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(100%)}}

/* CONFIRM MODAL */
#confirm-overlay{position:fixed;inset:0;background:rgba(7,9,26,.85);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.2s}
#confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:400px;width:100%;text-align:center}
.confirm-icon{width:52px;height:52px;border-radius:50%;background:rgba(240,82,82,.12);border:1px solid rgba(240,82,82,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--danger)}
.confirm-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--text2);margin-bottom:22px}
.confirm-btns{display:flex;gap:10px;justify-content:center}

/* OVERDUE indicator */
.overdue-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-title{font-size:18px;font-weight:700;color:var(--text)}

/* FILE UPLOAD */
.file-zone{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;transition:.15s;background:var(--bg3)}
.file-zone:hover{border-color:var(--primary);background:rgba(79,107,240,.04)}
.file-zone input{display:none}
.file-zone p{font-size:13px;color:var(--text3)}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12.5px}
.file-item .fname{flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .fsize{color:var(--text3)}

/* GRID LAYOUTS */
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* YAKLAŞAN */
.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.upcoming-item:last-child{border-bottom:none}
.upcoming-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.upcoming-info{flex:1;min-width:0}
.upcoming-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upcoming-date{font-size:11.5px;color:var(--text3)}
.upcoming-days{font-size:12px;font-weight:600;border-radius:99px;padding:2px 8px}

/* ACTIVITY */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px}
.activity-text{flex:1;font-size:13px;color:var(--text2)}
.activity-time{font-size:11.5px;color:var(--text3);white-space:nowrap}

/* PERMISSIONS TABLE */
.perm-table{width:100%;border-collapse:collapse;font-size:13px}
.perm-table th{background:var(--bg3);padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.perm-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.perm-table tr:last-child td{border-bottom:none}

/* SELECTOR */
.role-selector{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.role-opt{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text2);transition:.15s}
.role-opt:hover{border-color:var(--border2);color:var(--text)}
.role-opt.active{background:rgba(79,107,240,.15);border-color:var(--primary);color:var(--primary)}

/* TOPBAR firma logo */
#topbar-logo{width:28px;height:28px;border-radius:8px;object-fit:contain;display:none}

/* Responsive */
@media(max-width:768px){
  #sidebar{width:200px;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .form-row{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}

/* Mask */
.masked{letter-spacing:3px;color:var(--text3)}

/* Tooltip */
[data-tip]{position:relative}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11.5px;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:.15s;z-index:999}
[data-tip]:hover::after{opacity:1}

/* Skeleton line */
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;opacity:.3;margin-bottom:12px}
.empty-state p{font-size:14px}

/* Password reveal */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:36px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);width:16px;height:16px}

/* Smooth page transitions */
.page{animation:fadeIn .18s ease}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Chart container */
.chart-container{position:relative;height:220px}

/* Multi-tag */
.tag-pills{display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:2px 8px;font-size:11px;color:var(--text2)}
.tag-more{background:var(--primary);background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;color:#fff}
</style>

<div id="app-loading" style="position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:#00d4aa;border-radius:50%;animation:spin .8s linear infinite"></div>
  <p id="app-loading-msg" style="color:#94a3b8;font-size:14px">Sunucuya bağlanıyor...</p>
</div>

<!-- LOGIN EKRANI -->
<div id="login-screen" style="display:none;position:fixed;inset:0;z-index:8000;background:#0f172a;align-items:center;justify-content:center">
  <div style="width:100%;max-width:400px;padding:24px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#00d4aa,#7b9ff5);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div style="font-size:20px;font-weight:700;color:#f1f5f9" id="login-firm-name">KYS</div>
      <div style="font-size:12px;color:#64748b;margin-top:4px">Kalite Yönetim Sistemi</div>
    </div>
    <div style="background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:500">Kullanıcı Adı</label>
        <input id="login-username" type="text" placeholder="kullanici_adi"
          style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#f1f5f9;font-size:14px;outline:none;box-sizing:border-box"
          onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
      </div>
      <div style="margin-bottom:20px">

const DB = {
  _cache: {},
  _loaded: false,

  // Tüm veriyi API'den yükle (uygulama açılışında bir kez)
  _defQueue: [],

  async loadAll() {
    let retries = 3;
    while(retries > 0) {
      try {
        const res = await fetch('/api/store');
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        this._cache = data;
        this._loaded = true;
        return;
      } catch(e) {
        retries--;
        console.warn('API isteği başarısız, kalan deneme:', retries, e.message);
        if(retries > 0) await new Promise(r => setTimeout(r, 1500));
      }
    }
    console.warn('API erişilemiyor, localStorage fallback');
    for(const key of Object.keys(localStorage)) {
      if(key.startsWith('qms_')) {
        const k = key.replace('qms_','');
        try { this._cache[k] = JSON.parse(localStorage.getItem(key)); } catch{}
      }
    }
    this._loaded = true;
  },

  // Varsayılan verileri API'ye toplu olarak yaz (sadece DB'de yoksa)
  async flushDefaults() {
    if(this._defQueue.length === 0) return;
    // Sadece cache'de olmayan (DB'den gelmeyen) varsayılanları yaz
    const batch = {};
    for(const [k, v] of this._defQueue) {
      // Eğer DB'den zaten geldiyse üzerine yazma
      if(!(k in this._cache) || this._cache[k] === null) {
        batch[k] = v;
        this._cache[k] = v;
      }
    }
    this._defQueue = [];
    if(Object.keys(batch).length === 0) return;
    try {
      await fetch('/api/store', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(batch)
      });
      console.log('Ilk kurulum verileri yazildi:', Object.keys(batch).join(', '));
    } catch(e) {
      console.warn('Varsayilan veriler yazilamadi:', e);
    }
  },

  get(k) {
    return this._cache[k] ?? null;
  },

  set(k, v) {
    this._cache[k] = v;
    // API'ye async kaydet (fire and forget)
    fetch('/api/store/' + k, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({value: v})
    }).catch(e => {
      // API yoksa localStorage'a yaz
      localStorage.setItem('qms_' + k, JSON.stringify(v));
    });
  },

  def(k, v) {
    if(this.get(k) === null) {
      this._cache[k] = v;
      // flushDefaults() çağrılana kadar queue'da beklet
      this._defQueue.push([k, v]);
    }
  }
};

function buildNav(){
  const nav=document.getElementById('nav-menu');
  nav.innerHTML='';
  NAV_ITEMS.forEach(item=>{
    if(item.mod && !canView(item.mod)) return;
    if(item.id==='ayarlar'){const u=getActiveUser();if(u?.rol!=='Yonetici') return;}
    if(item.children){
      const open=STATE.navOpen[item.id];
      const div=document.createElement('div');
      div.innerHTML=`
        <div class="nav-item ${open?'open':''}" onclick="toggleNav('${item.id}')">
          ${icon(item.icon)} <span>${item.label}</span>
          ${icon('chevron')} 
        </div>
        <div class="sub-nav ${open?'open':''}" id="sub-${item.id}">
          ${item.children.filter(c=>!c.mod||canView(c.mod)).map(c=>`
            <div class="nav-item ${STATE.page===c.page?'active':''}" onclick="navigate('${c.page}')">
              ${icon(c.icon)} <span>${c.label}</span>
            </div>`).join('')}
        </div>`;
      nav.appendChild(div);
    } else {
      const div=document.createElement('div');
      div.innerHTML=`<div class="nav-item ${STATE.page===item.page?'active':''}" onclick="navigate('${item.page}')">
        ${icon(item.icon)} <span>${item.label}</span></div>`;
      nav.appendChild(div);
    }
  });
}

function toggleNav(id){
  STATE.navOpen[id]=!STATE.navOpen[id];
  buildNav();
}

function uid(){return 'id_'+Math.random().toString(36).substr(2,9)+'_'+Date.now()}

function daysDiff(d){if(!d)return null;const diff=new Date(d)-new Date();return Math.ceil(diff/864e5)}
function truncate(s,n=30){return s&&s.length>n?s.substr(0,n)+'…':s||''}

function enColor(v){
  if(v===null||v===''||v===undefined) return 'var(--text3)';
  const n=Number(v);
  if(n<0.5) return 'var(--danger)';
  if(n<0.75) return 'var(--warn)';
  return 'var(--success)';
}
function enBar(v){

  const n=Number(v);

  return `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${n*100}%;background:${c}"></div></div><span class="en-value" style="color:${c}">${n.toFixed(2)}</span></div>`;
}

// ==================== FILE UPLOAD HELPERS ====================
function fileInput(id,accept='*',multi=false){
  return `<div class="file-zone" onclick="document.getElementById('fi_${id}').click()">
    <input type="file" id="fi_${id}" ${multi?'multiple':''} accept="${accept}" style="display:none" onchange="handleFileInput('${id}',this)">
    ${icon('upload',18)}<p style="margin-top:8px">Dosya seçmek için tıklayın<br><small style="font-size:11px">${accept}</small></p>
  </div><div class="file-list" id="fl_${id}"></div>`;
}

const _pendingFiles={};
function handleFileInput(id,inp){
  if(!_pendingFiles[id]) _pendingFiles[id]=[];
  Array.from(inp.files).forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      _pendingFiles[id].push({name:f.name,size:f.size,data:e.target.result,type:f.type});
      renderFileList(id);
    };
    reader.readAsDataURL(f);
  });
}
function renderFileList(id){
  const el=document.getElementById('fl_'+id);
  if(!el) return;
  const files=_pendingFiles[id]||[];
  el.innerHTML=files.map((f,i)=>`<div class="file-item">${icon('file-pdf',13)}<span class="fname">${f.name}</span><span class="fsize">${(f.size/1024).toFixed(1)}KB</span><div class="icon-btn danger" onclick="_pendingFiles['${id}'].splice(${i},1);renderFileList('${id}')">${icon('trash',12)}</div></div>`).join('');
}
function getPendingFiles(id){return _pendingFiles[id]||[]}
function clearPendingFiles(id){_pendingFiles[id]=[];}
function setExistingFiles(id,files){_pendingFiles[id]=[...(files||[])];renderFileList(id);}

function previewFile(file){
  if(!file||!file.data) return;

  if(file.type==='application/pdf'){
    // base64 data URL -> Blob -> blob: URL -> yeni sekme
    // Chrome file:/// üzerinde blob: URL'yi yeni sekmede açmaya izin VERİYOR
    try{
      const base64=file.data.split(',')[1];
      const binary=atob(base64);
      const bytes=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
      const blob=new Blob([bytes],{type:'application/pdf'});
      const url=URL.createObjectURL(blob);
      window.open(url,'_blank');
      // Bellek temizliği (30sn sonra)
      setTimeout(()=>URL.revokeObjectURL(url),30000);
    }catch(e){
      // Fallback: direkt indirme
      const a=document.createElement('a');
      a.href=file.data; a.download=file.name||'belge.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
  } else {
    const ov=document.createElement('div');
    ov.className='modal-overlay open';
    ov.style.zIndex=3000;
    ov.innerHTML=`<div class="modal" style="max-width:420px">
      <div class="modal-header">
        <div class="modal-title">${file.name||'Dosya'}</div>
        <div class="modal-close" onclick="this.closest('.modal-overlay').remove()">${icon('x-circle',16)}</div>
      </div>
      <div class="modal-body" style="text-align:center;padding:32px 24px">
        <div style="width:56px;height:56px;border-radius:14px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--accent)">${icon('download',24)}</div>
        <p style="font-size:14px;color:var(--text);margin-bottom:6px;font-weight:600">${file.name}</p>
        <p style="font-size:12px;color:var(--text3);margin-bottom:20px">${(file.size/1024).toFixed(1)} KB — Bu dosya türü tarayıcıda önizlenemez.</p>
        <a href="${file.data}" download="${file.name}" class="btn btn-primary" style="width:100%;justify-content:center">${icon('download',14)} İndir</a>
      </div>
    </div>`;
    document.body.appendChild(ov);
  }
}

function getDocFiltered(){
  const docs=DB.get('documents')||[];
  const q=(document.getElementById('doc-search')?.value||'').toLowerCase();
  const tip=document.getElementById('doc-filter-tip')?.value||'';
  const durum=document.getElementById('doc-filter-durum')?.value||'';
  const sort=document.getElementById('doc-sort')?.value||'yayim';
  let filtered=docs.filter(d=>{
    if(q && !(d.kod?.toLowerCase().includes(q)||d.ad?.toLowerCase().includes(q))) return false;
    if(tip && d.tip!==tip) return false;
    if(durum && d.durum!==durum) return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='yayim') return (b.yayimTarihi||'').localeCompare(a.yayimTarihi||'');
    if(sort==='revizyon') return (b.revTarihi||'').localeCompare(a.revTarihi||'');
    if(sort==='no') return (b.revNo||0)-(a.revNo||0);
    return 0;
  });
  return filtered;
}

function previewImportDocFile(input){
  const file = input.files[0];
  if(!file) return;
  document.getElementById('import-doc-fname').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(e){
    const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    // Başlık satırını atla (A1 metinse)
    const dataRows = rows.filter(function(r){ return r[1] && String(r[1]).trim(); });
    const count = dataRows.length;
    document.getElementById('import-doc-preview').innerHTML =
      '<span style="color:var(--accent)">' + count + ' satır</span> bulundu - İçe Aktar butonuna bas';
    document.getElementById('import-doc-btn').disabled = count===0;
    // Veriyi geçici olarak sakla
    window._importDocRows = dataRows;
  };
  reader.readAsArrayBuffer(file);
}

function doImportDocsExcel(){
  const rows = window._importDocRows;
  if(!rows||!rows.length){toast('Veri bulunamadı','error');return;}
  const docs = DB.get('documents') || [];
  const existing = {};
  docs.forEach(function(d){ existing[d.kod]=true; });
  let added=0, skipped=0;

  rows.forEach(function(r){
    const ad    = String(r[0]||'').trim();
    const kod   = String(r[1]||'').trim();
    const tarih = r[2] ? String(r[2]).trim() : '';
    const revNo = parseInt(r[3])||0;
    const tip   = String(r[4]||'Prosedür').trim();
    if(!ad||!kod){return;}
    if(existing[kod]){skipped++;return;}

    // Tarih parse
    let yayimTarihi = '';
    if(tarih){
      // Excel date objesi veya string
      const t = tarih.split('.');
      if(t.length===3){
        const gun=t[0].padStart(2,'0');
        const ay=t[1].padStart(2,'0');
        const yil=t[2].length===2?'20'+t[2]:t[2];
        yayimTarihi=yil+'-'+ay+'-'+gun;
      } else if(tarih.includes('-')){
        yayimTarihi = tarih;
      }
    }

    docs.push({
      id:'doc_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      kod:kod, ad:ad, tip:tip,
      yayimTarihi: revNo===0 ? yayimTarihi : '',
      revTarihi:   revNo>0  ? yayimTarihi : '',
      revNo:revNo, durum:'Aktif', notlar:'', files:[], kategori:''
    });
    existing[kod]=true;
    added++;
  });

  DB.set('documents', docs);
  document.querySelector('.modal-overlay[style*="3000"]').remove();
  toast(added+' döküman eklendi'+(skipped?' ('+skipped+' atlandı)':''), 'success');
  renderDokumanListesi();
}

function saveRevize(){
  const docs=DB.get('documents')||[];
  const revs=DB.get('docRevisions')||[];
  const i=docs.findIndex(d=>d.id===_revizeDocId);
  if(i<0) return;
  const old={...docs[i]};

  docs[i].revTarihi=today();
  docs[i].durum='Revizyonda';
  const not=document.getElementById('rv-not').value;
  revs.push({id:uid(),ts:new Date().toISOString(),docId:_revizeDocId,kod:docs[i].kod,tip:docs[i].tip,ad:docs[i].ad,eskiRev:old.revNo,yeniRev:docs[i].revNo,not,yapan:u?`${u.ad} ${u.soyad}`:'Sistem',files:docs[i].files||[]});
  DB.set('documents',docs);

function uploadDocFile(id, type){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept = type==='pdf' ? 'application/pdf' : '.doc,.docx,.xls,.xlsx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const docs=DB.get('documents')||[];
      const i=docs.findIndex(x=>x.id===id); if(i<0) return;
      if(type==='pdf') docs[i].pdfFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      else docs[i].officeFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      DB.set('documents',docs);
      renderDocTable();
      toast(`${type==='pdf'?'PDF':'Word/Excel'} yüklendi: ${f.name}`,'success');
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function previewDocFileById(id, type){
  const doc=(DB.get('documents')||[]).find(d=>d.id===id);
  if(!doc) return;
  const file = type==='pdf' ? doc.pdfFile : doc.officeFile;
  if(!file){toast('Dosya bulunamadı','error');return;}
  previewFile(file);
}

function previewDocFile(id,type){
  previewDocFileById(id,type==='pdf'?'pdf':'office');
}

function renderRevTable(){
  const tbody=document.getElementById('rv-tbody');if(!tbody)return;
  let revs=DB.get('docRevisions')||[];
  const q=(document.getElementById('rv-search')?.value||'').toLowerCase();
  const tip=document.getElementById('rv-tip')?.value||'';
  const d1=document.getElementById('rv-date1')?.value||'';
  const d2=document.getElementById('rv-date2')?.value||'';
  revs=revs.filter(r=>{
    if(q&&!(r.kod?.toLowerCase().includes(q)||r.ad?.toLowerCase().includes(q)))return false;
    if(tip&&r.tip!==tip)return false;
    if(d1&&r.ts<d1)return false;
    if(d2&&r.ts>d2+'T23:59')return false;
    return true;
  });
  if(!revs.length){tbody.innerHTML=`<tr><td colspan="9"><div class="empty-state"><p>Revizyon bulunamadı</p></div></td></tr>`;return;}
  tbody.innerHTML=revs.map(r=>`<tr>
    <td>${new Date(r.ts).toLocaleString('tr-TR')}</td>
    <td class="strong">${r.kod||'-'}</td>
    <td><span class="badge ${DOC_TYPE_COLORS[r.tip]||'badge-gray'}">${r.tip||'-'}</span></td>
    <td>${truncate(r.ad,25)}</td>
    <td><span class="badge badge-gray">${r.eskiRev}</span></td>
    <td><span class="badge badge-blue">${r.yeniRev}</span></td>
    <td style="max-width:150px;color:var(--text3)">${truncate(r.not,30)}</td>
    <td>${r.yapan||'-'}</td>
    <td><div class="action-btns">

function renderLakTable(type){
  const tbody=document.getElementById('lak-tbody');if(!tbody)return;
  let items=DB.get(type)||[];
  const q=(document.getElementById('lak-search')?.value||'').toLowerCase();
  const kat=document.getElementById('lak-kat')?.value||'';
  const durum=document.getElementById('lak-durum')?.value||'';
  const la=type==='lak';
  const tableId=type; // 'lak' veya 'pak'
  items=items.filter(x=>{
    const name=la?x.lakAdi:x.pakAdi;
    const kod=la?x.lakKodu:x.pakKodu;
    if(q&&!(name?.toLowerCase().includes(q)||kod?.toLowerCase().includes(q)))return false;
    if(kat&&x.kategori!==kat)return false;
    if(durum&&x.durum!==durum)return false;
    return true;
  });

  // Thead güncelle
  const theadEl=document.getElementById('lak-thead-el');
  if(theadEl){
    const lakCols=[
      {key:'kategori',label:'Kategori'},
      {key:la?'lakAdi':'pakAdi',label:la?'Lak Adı':'Pak Adı'},
      {key:la?'lakKodu':'pakKodu',label:la?'Lak Kodu':'Pak Kodu'},
      ...(la?[{key:'duzenleyenKuruluş',label:'Düzenleyen Kuruluş'}]:[]),
      {key:la?'lakKatilimTarihi':'pakKatilimTarihi',label:'Katılım Tarihi'},
      {key:'sonucRaporTarihi',label:'Sonuç Rapor'},
      {key:la?'birSonrakiPlanliLak':'birSonrakiPlanliPak',label:'Sonraki Planlanan'},
      {key:'enSkoru',label:'EN Skoru'},
      {key:'ilgiliStandart',label:'İlgili Standart'},
      {key:'durum',label:'Durum'},
      {key:'__islemler',label:''}
    ];
    theadEl.innerHTML=buildSortThead(tableId, lakCols);
  }
  items=applySortToItems(tableId, items);

  if(!items.length){tbody.innerHTML=`<tr><td colspan="12"><div class="empty-state"><p>Kayıt bulunamadı</p></div></td></tr>`;return;}
  const mod=type;
  tbody.innerHTML=items.map(x=>{
    const name=la?x.lakAdi:x.pakAdi;
    const kod=la?x.lakKodu:x.pakKodu;
    const kat2=la?x.lakKatilimTarihi:x.pakKatilimTarihi;
    const sp=la?x.birSonrakiPlanliLak:x.birSonrakiPlanliPak;
    return `<tr>
    <td>${katBadge(x.kategori)}</td>
    <td class="strong">${name||'-'}</td>
    <td>${kod||'-'}</td>
    ${la?`<td>${x.duzenleyenKuruluş||'-'}</td>`:''}
    <td>${formatDate(kat2)}</td>
    <td>${formatDate(x.sonucRaporTarihi)}</td>
    <td>${formatDate(sp)}</td>
    <td>${enBar(x.enSkoru)}</td>
    <td style="font-size:11.5px">${x.ilgiliStandart||'-'}</td>
    <td>${canEdit(mod)?`<select class="tb-select" style="padding:3px 6px;font-size:11.5px" onchange="updateLakDurum('${x.id}','${type}',this.value)"><option ${x.durum==='Sonuç Bekleniyor'?'selected':''}>Sonuç Bekleniyor</option><option ${x.durum==='Tamamlandı'?'selected':''}>Tamamlandı</option></select>`:`<span class="badge ${x.durum==='Tamamlandı'?'badge-green':'badge-amber'}">${x.durum||'-'}</span>`}</td>

      ${x.pdfFile?`<button class="icon-btn" title="PDF Önizle" onclick="previewLakFileById('${x.id}','${type}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('eye',12)}</button>`:''}
      ${canEdit(mod)?`<button class="icon-btn" title="Word/Excel Yükle" onclick="uploadLakFile('${x.id}','${type}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">W/E</span></button>`:''}
      ${x.officeFile?`<button class="icon-btn" title="Word/Excel Önizle/İndir" onclick="previewLakFileById('${x.id}','${type}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('eye',12)}</button>`:''}
      ${canEdit(mod)?`<button class="icon-btn" title="Düzenle" onclick="openLakModal('${x.id}','${type}')">${icon('edit',13)}</button>`:''}
      ${canEdit(mod)?`<button class="icon-btn danger" title="Sil" onclick="deleteLak('${x.id}','${type}')">${icon('trash',13)}</button>`:''}

function updateLakDurum(id,type,val){
  const items=DB.get(type)||[];
  const i=items.findIndex(x=>x.id===id);
  if(i<0)return;
  const old=items[i].durum;
  items[i].durum=val;
  DB.set(type,items);
  const u=getActiveUser();
  logHistory(type+'History',{actionType:'status_change',itemId:id,user:u?`${u.ad} ${u.soyad}`:'',changes:{old,new:val},snapshot:{...items[i]}});
  renderLakTable(type);
  toast('Durum güncellendi','success');
}

async function deleteLak(id,type){
  const ok=await confirm('Bu kayıt silinecek. Emin misiniz?');
  if(!ok)return;
  const items=DB.get(type)||[];
  DB.set(type,items.filter(x=>x.id!==id));
  toast('Silindi','success');
  renderLakTable(type);
}

function previewLakFile(id,type){
  previewLakFileById(id,type,'pdf');
}

function uploadLakFile(id, type, fileType){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept = fileType==='pdf' ? 'application/pdf' : '.doc,.docx,.xls,.xlsx';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const items=DB.get(type)||[];
      const i=items.findIndex(x=>x.id===id); if(i<0) return;
      if(fileType==='pdf') items[i].pdfFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      else items[i].officeFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      DB.set(type,items);
      renderLakTable(type);
      toast(`${fileType==='pdf'?'PDF':'Word/Excel'} yüklendi: ${f.name}`,'success');
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function previewLakFileById(id, type, fileType){
  const item=(DB.get(type)||[]).find(x=>x.id===id);
  if(!item) return;
  const file = fileType==='pdf' ? item.pdfFile : item.officeFile;
  if(!file){toast('Dosya bulunamadı','error');return;}
  previewFile(file);
}

let _editLakId=null, _editLakType=null;
function openLakModal(id,type){
  _editLakId=id; _editLakType=type;
  const la=type==='lak';
  const label=la?'Lak':'Pak';
  document.getElementById('lak-modal-title').textContent=id?`${label} Düzenle`:`${label} Ekle`;
  if(id){
    const item=(DB.get(type)||[]).find(x=>x.id===id);
    if(!item)return;
    document.getElementById('l-ad').value=la?item.lakAdi:item.pakAdi||'';
    document.getElementById('l-kod').value=la?item.lakKodu:item.pakKodu||'';
    if(la&&document.getElementById('l-kuruluş')) document.getElementById('l-kuruluş').value=item.duzenleyenKuruluş||'';
    document.getElementById('l-kat').value=item.kategori||'boyut';
    document.getElementById('l-standart').value=item.ilgiliStandart||'';
    document.getElementById('l-katilim').value=la?item.lakKatilimTarihi:item.pakKatilimTarihi||'';
    document.getElementById('l-sonuc').value=item.sonucRaporTarihi||'';
    document.getElementById('l-sonraki').value=la?item.birSonrakiPlanliLak:item.birSonrakiPlanliPak||'';
    document.getElementById('l-en').value=item.enSkoru||'';
    document.getElementById('l-durum').value=item.durum||'Sonuç Bekleniyor';
  } else {
    ['l-ad','l-kod','l-standart','l-en'].forEach(x=>{const el=document.getElementById(x);if(el)el.value='';});
    if(la&&document.getElementById('l-kuruluş')) document.getElementById('l-kuruluş').value='';
    document.getElementById('l-katilim').value=today();
    document.getElementById('l-sonuc').value='';
    document.getElementById('l-sonraki').value='';
    document.getElementById('l-durum').value='Sonuç Bekleniyor';
  }
  openModal('lak-modal');
}

function saveLak(type){
  const la=type==='lak';
  const ad=document.getElementById('l-ad').value.trim();
  const kod=document.getElementById('l-kod').value.trim();
  if(!ad||!kod){toast('Ad ve kod zorunlu','error');return;}
  const items=DB.get(type)||[];
  const u=getActiveUser();
  const data={
    kategori:document.getElementById('l-kat').value,
    ilgiliStandart:document.getElementById('l-standart').value,
    sonucRaporTarihi:document.getElementById('l-sonuc').value,
    enSkoru:document.getElementById('l-en').value,
    durum:document.getElementById('l-durum').value
  };
  if(la){
    data.lakAdi=ad; data.lakKodu=kod;
    data.lakKatilimTarihi=document.getElementById('l-katilim').value;
    data.birSonrakiPlanliLak=document.getElementById('l-sonraki').value;
    data.duzenleyenKuruluş=document.getElementById('l-kuruluş')?.value||'';
  } else {
    data.pakAdi=ad; data.pakKodu=kod;
    data.pakKatilimTarihi=document.getElementById('l-katilim').value;
    data.birSonrakiPlanliPak=document.getElementById('l-sonraki').value;
  }
  if(_editLakId){
    const i=items.findIndex(x=>x.id===_editLakId);
    if(i>=0){
      logHistory(type+'History',{actionType:'update',itemId:_editLakId,user:u?`${u.ad} ${u.soyad}`:'',changes:{old:{...items[i]},new:data},snapshot:{...items[i],...data}});
      items[i]={...items[i],...data};
    }
  } else {
    const newItem={id:uid(),...data,createdAt:new Date().toISOString()};
    items.push(newItem);
    logHistory(type+'History',{actionType:'create',itemId:newItem.id,user:u?`${u.ad} ${u.soyad}`:'',snapshot:newItem});
  }
  DB.set(type,items);
  closeModal('lak-modal');
  renderLakTable(type);
  toast('Kaydedildi','success');
}

function renderLakHist(type){
  const tbody=document.getElementById('lh-tbody');if(!tbody)return;
  let hist=DB.get(type+'History')||[];
  const q=(document.getElementById('lh-search')?.value||'').toLowerCase();
  const act=document.getElementById('lh-action')?.value||'';
  hist=hist.filter(h=>{
    if(act&&h.actionType!==act)return false;
    if(q&&!JSON.stringify(h).toLowerCase().includes(q))return false;
    return true;
  });
  const actionLabels={create:'Oluşturuldu',update:'Güncellendi',status_change:'Durum Değişti',delete:'Silindi',file_upload:'Dosya Yüklendi'};
  const actionColors={create:'badge-green',update:'badge-blue',status_change:'badge-amber',delete:'badge-red',file_upload:'badge-teal'};
  if(!hist.length){tbody.innerHTML=`<tr><td colspan="4"><div class="empty-state"><p>Geçmiş bulunamadı</p></div></td></tr>`;return;}
  tbody.innerHTML=hist.map(h=>`<tr>
    <td>${new Date(h.ts).toLocaleString('tr-TR')}</td>
    <td class="strong">${h.user||'-'}</td>
    <td><span class="badge ${actionColors[h.actionType]||'badge-gray'}">${actionLabels[h.actionType]||h.actionType}</span></td>
    <td style="font-size:12px;color:var(--text3)">${h.changes?`${h.changes.old||''} → ${h.changes.new||''}`:h.actionType==='create'?'Yeni kayıt oluşturuldu':'-'}</td>
  </tr>`).join('');
}

function renderAraTable(){
  const tbody=document.getElementById('ara-tbody');if(!tbody)return;
  let items=DB.get('araKontrol')||[];
  const q=(document.getElementById('ara-search')?.value||'').toLowerCase();
  const kat=document.getElementById('ara-kat')?.value||'';
  const durum=document.getElementById('ara-durum')?.value||'';
  const todayStr=today();
  items=items.map(x=>{
    if(!x.manualDurum&&x.birSonrakiPlanliAra&&x.birSonrakiPlanliAra<todayStr&&x.durum!=='Tamamlandı') x.durum='Gecikti';
    return x;
  });
  items=items.filter(x=>{
    const fields=[x.cihazAdi,x.marka,x.model,x.seriNo,x.envanterNo];
    if(q&&!fields.some(f=>f?.toLowerCase().includes(q)))return false;
    if(kat&&x.kategori!==kat)return false;
    if(durum&&x.durum!==durum)return false;
    return true;
  });
  // Thead güncelle
  const araTheadEl=document.getElementById('ara-thead-el');
  if(araTheadEl){
    const araCols=[
      {key:'kategori',label:'Kategori'},
      {key:'cihazAdi',label:'Cihaz Adı'},
      {key:'marka',label:'Marka'},
      {key:'model',label:'Model'},
      {key:'seriNo',label:'Seri No'},
      {key:'envanterNo',label:'Envanter No'},
      {key:'araKontrolTarihi',label:'Ara Kontrol Tarihi'},
      {key:'birSonrakiPlanliAra',label:'Sonraki Planlanan'},
      {key:'yapan',label:'Yapan'},
      {key:'kriter',label:'Kriter'},
      {key:'durum',label:'Durum'},
      {key:'__islemler',label:'Dosyalar'},
      {key:'__islemler2',label:'İşlemler'},
    ];
    araTheadEl.innerHTML=buildSortThead('ara', araCols);
  }
  items=applySortToItems('ara', items);
  if(!items.length){tbody.innerHTML=`<tr><td colspan="13"><div class="empty-state"><p>Kayıt bulunamadı</p></div></td></tr>`;return;}
  tbody.innerHTML=items.map(x=>{
    const isOverdue=x.durum==='Gecikti';
    const durumBadge={Planlandı:'badge-blue',Tamamlandı:'badge-green','Sonuç Bekleniyor':'badge-amber',Gecikti:'badge-red'}[x.durum]||'badge-gray';
    const isISO=x.kriter?.includes('ISO 17025')||x.kriter?.includes('ISO/IEC 17025');
    return `<tr>

function calcRefDurum(x){
  if(x.manualDurum) return x.durum;
  const d=daysDiff(x.birSonrakiKalibrasyon);
  if(d===null) return 'Güncel';
  if(d<0) return 'Geçti';
  if(d<=30) return 'Kalibrasyon Yaklaştı';
  return 'Güncel';
}

// Referans tablo sort state

// ==================== GENEL TABLO SORT ====================
const _tableSort = {};
function sortTableBy(tableId, col){
  if(!_tableSort[tableId]) _tableSort[tableId] = {col:null, dir:1};
  const s = _tableSort[tableId];
  if(s.col === col) s.dir *= -1;
  else { s.col = col; s.dir = 1; }
  // Hangi tabloyu yenileyeceğiz?
  if(tableId==='lak') renderLakTable('lak');
  else if(tableId==='pak') renderLakTable('pak');
  else if(tableId==='ara') renderAraKontrolTable();
  else if(tableId==='dok') renderDocTable();
  else if(tableId==='dk') renderDKTable();
}

function buildSortThead(tableId, cols){
  const s = _tableSort[tableId] || {col:null, dir:1};
  return '<tr>' + cols.map(c => {
    if(c.key === '__islemler') return '<th>İşlemler</th>';
    const active = s.col === c.key;
    const arrow = active ? (s.dir===1 ? ' ▲' : ' ▼') : ' ⇅';
    return `<th onclick="sortTableBy('${tableId}','${c.key}')" style="cursor:pointer;user-select:none;white-space:nowrap;${active?'color:var(--accent)':''}">${c.label}<span style="font-size:10px;opacity:${active?1:0.35}">${arrow}</span></th>`;
  }).join('') + '</tr>';
}

function applySortToItems(tableId, items){
  const s = _tableSort[tableId];
  if(!s || !s.col) return items;
  const col = s.col, dir = s.dir;
  return [...items].sort((a,b)=>{
    const av = String(a[col]||'').toLowerCase();
    const bv = String(b[col]||'').toLowerCase();
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

let _refSort = {col: null, dir: 1};

function sortRefBy(col){
  if(_refSort.col === col) _refSort.dir *= -1;
  else { _refSort.col = col; _refSort.dir = 1; }
  renderRefTable();
}

function renderRefTable(){
  const tbody=document.getElementById('ref-tbody');if(!tbody)return;
  let items=DB.get('referans')||[];
  const q=(document.getElementById('ref-search')?.value||'').toLowerCase();
  const durum=document.getElementById('ref-durum')?.value||'';
  items=items.map(x=>({...x,_durum:calcRefDurum(x)}));
  items=items.filter(x=>{
    const fields=[x.kategori,x.cihazAdi,x.marka,x.model,x.seriNo,x.envanterNo,x.kalibrasyonNo];
    if(q&&!fields.some(f=>f?.toLowerCase().includes(q)))return false;
    if(durum&&x._durum!==durum)return false;
    return true;
  });

  // Sıralama
  const cols = [
    {key:'kategori',        label:'Kategori'},
    {key:'cihazAdi',        label:'Cihaz Adı'},
    {key:'marka',           label:'Marka'},
    {key:'model',           label:'Model'},
    {key:'seriNo',          label:'Seri No'},
    {key:'envanterNo',      label:'Envanter No'},
    {key:'kalibrasyonNo',   label:'Kalibrasyon No'},
    {key:'kalibrasyonTarihi',      label:'Kalibrasyon Tarihi'},
    {key:'birSonrakiKalibrasyon',  label:'Sonraki Kalibrasyon'},
    {key:'degerlendirmeKriteri',   label:'Değerlendirme Kriteri'},
    {key:'_durum',          label:'Durum'},
  ];

  // Thead güncelle
  const thead = document.getElementById('ref-thead');
  if(thead){
    thead.innerHTML = '<tr>' + cols.map(c=>{
      const active = _refSort.col === c.key;
      const arrow = active ? (_refSort.dir===1 ? ' ▲' : ' ▼') : ' ⇅';
      return `<th onclick="sortRefBy('${c.key}')" style="cursor:pointer;user-select:none;white-space:nowrap;${active?'color:var(--accent)':''}">${c.label}<span style="font-size:10px;opacity:${active?1:0.35}">${arrow}</span></th>`;
    }).join('') + '<th>İşlemler</th></tr>';
  }

  if(_refSort.col){
    const col = _refSort.col;
    const dir = _refSort.dir;
    items.sort((a,b)=>{
      const av = String(a[col]||'').toLowerCase();
      const bv = String(b[col]||'').toLowerCase();
      return av < bv ? -dir : av > bv ? dir : 0;
    });
  }
  if(!items.length){tbody.innerHTML=`<tr><td colspan="12"><div class="empty-state"><p>Kayıt bulunamadı</p></div></td></tr>`;return;}
  const durumBadge={'Güncel':'badge-green','Kalibrasyon Yaklaştı':'badge-amber','Geçti':'badge-red'};
  tbody.innerHTML=items.map(x=>`<tr>
    <td>${x.kategori||'-'}</td>
    <td class="strong">${x.cihazAdi||'-'}</td>
    <td>${x.marka||'-'}</td><td>${x.model||'-'}</td><td>${x.seriNo||'-'}</td><td>${x.envanterNo||'-'}</td>
    <td>${x.kalibrasyonNo||'-'}</td>
    <td>${formatDate(x.kalibrasyonTarihi)}</td>
    <td>${formatDate(x.birSonrakiKalibrasyon)}</td>
    <td style="font-size:11.5px">${x.degerlendirmeKriteri||'-'}</td>
    <td><span class="badge ${durumBadge[x._durum]||'badge-gray'}">${x._durum||'-'}</span>${x.manualDurum?'<span style="font-size:10px;color:var(--text3);margin-left:4px">manuel</span>':''}</td>
    <td><div class="action-btns">
      ${canEdit('referans')?`<button class="icon-btn" title="PDF Yükle" onclick="uploadRefFile('${x.id}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">PDF</span></button>`:''}
      ${x.pdfFile?`<button class="icon-btn" title="PDF Önizle" onclick="previewRefFileById('${x.id}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('eye',12)}</button>`:''}
      ${canEdit('referans')?`<button class="icon-btn" title="Word/Excel Yükle" onclick="uploadRefFile('${x.id}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">W/E</span></button>`:''}
      ${x.officeFile?`<button class="icon-btn" title="Word/Excel Önizle/İndir" onclick="previewRefFileById('${x.id}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('eye',12)}</button>`:''}
      ${canEdit('referans')?`<button class="icon-btn" onclick="openRefModal('${x.id}')">${icon('edit',13)}</button>`:''}
      ${canEdit('referans')?`<button class="icon-btn danger" onclick="deleteRef('${x.id}')">${icon('trash',13)}</button>`:''}

function previewImportRefFile(input){
  const file = input.files[0];
  if(!file) return;
  document.getElementById('import-ref-fname').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(e){
    const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    // Başlık satırını atla - A sütunu sayısal değilse başlıktır
    const dataRows = rows.filter(function(r){ return r[0] && String(r[0]).trim(); });
    document.getElementById('import-ref-preview').innerHTML =
      '<span style="color:var(--accent)">' + dataRows.length + ' cihaz</span> bulundu';
    document.getElementById('import-ref-btn').disabled = dataRows.length === 0;
    window._importRefRows = dataRows;
  };
  reader.readAsArrayBuffer(file);
}

function parseExcelDate(val){
  if(!val) return '';
  // JS Date objesi (cellDates:true ile geliyor)
  if(val instanceof Date){
    const gun = String(val.getDate()).padStart(2,'0');
    const ay  = String(val.getMonth()+1).padStart(2,'0');
    return val.getFullYear()+'-'+ay+'-'+gun;
  }
  // Excel serial number
  if(typeof val === 'number'){
    const d = new Date(Math.round((val - 25569)*86400*1000));
    const gun = String(d.getUTCDate()).padStart(2,'0');
    const ay  = String(d.getUTCMonth()+1).padStart(2,'0');
    return d.getUTCFullYear()+'-'+ay+'-'+gun;
  }
  const s = String(val).trim();
  // GG.AA.YYYY
  const t = s.split('.');
  if(t.length === 3){
    const gun = t[0].padStart(2,'0');
    const ay  = t[1].padStart(2,'0');
    const yil = t[2].length === 2 ? '20'+t[2] : t[2];
    return yil+'-'+ay+'-'+gun;
  }
  // YYYY-MM-DD
  if(s.includes('-') && s.length >= 8) return s;
  return '';
}

function doImportRefExcel(){
  const rows = window._importRefRows;
  if(!rows||!rows.length){toast('Veri bulunamadı','error');return;}
  const items = DB.get('referans') || [];
  const existing = {};
  items.forEach(function(d){ if(d.seriNo) existing[d.seriNo]=true; });
  let added=0, skipped=0;

  rows.forEach(function(r){
    const kategori        = String(r[0]||'').trim();
    const cihazAdi        = String(r[1]||'').trim();
    const marka           = String(r[2]||'').trim();
    const model           = String(r[3]||'').trim();
    const seriNo          = String(r[4]||'').trim();
    const envanterNo      = String(r[5]||'').trim();
    const kalibrasyonNo   = String(r[6]||'').trim();
    const kalibrasyonTar  = parseExcelDate(r[7]);
    const sonrakiKal      = parseExcelDate(r[8]);

    if(!cihazAdi) return;
    if(seriNo && existing[seriNo]){ skipped++; return; }

    items.push({
      id: 'ref_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      kategori, cihazAdi, marka, model, seriNo, envanterNo,
      kalibrasyonNo, kalibrasyonTarihi: kalibrasyonTar,
      birSonrakiKalibrasyon: sonrakiKal,
      durum: 'Aktif', notlar: '', files: []
    });
    if(seriNo) existing[seriNo] = true;
    added++;
  });

  DB.set('referans', items);
  document.querySelector('.modal-overlay[style*="3000"]').remove();
  toast(added+' cihaz eklendi'+(skipped?' ('+skipped+' atlandı)':''), 'success');
  renderReferans();
}

function saveRef(){
  const cihaz=document.getElementById('r-cihaz').value.trim();
  if(!cihaz){toast('Cihaz adı zorunlu','error');return;}
  const items=DB.get('referans')||[];
  const md=document.getElementById('r-durum').value;
  const data={cihazAdi:cihaz,marka:document.getElementById('r-marka').value,model:document.getElementById('r-model').value,seriNo:document.getElementById('r-seri').value,envanterNo:document.getElementById('r-envanter').value,kalibrasyonNo:document.getElementById('r-kalno').value,kalibrasyonTarihi:document.getElementById('r-tarih').value,birSonrakiKalibrasyon:document.getElementById('r-sonraki').value,degerlendirmeKriteri:document.getElementById('r-kriter').value,durum:md||'Güncel',manualDurum:!!md};
  const u2=getActiveUser();
  if(_editRefId){
    const i=items.findIndex(x=>x.id===_editRefId);
    if(i>=0){
      logHistory('referansHistory',{actionType:'update',itemId:_editRefId,user:u2?`${u2.ad} ${u2.soyad}`:'',snapshot:{...items[i],...data},cihazAdi:cihaz});
      items[i]={...items[i],...data};
    }
  } else {
    const newItem={id:uid(),...data,createdAt:new Date().toISOString()};
    items.push(newItem);
    logHistory('referansHistory',{actionType:'create',itemId:newItem.id,user:u2?`${u2.ad} ${u2.soyad}`:'',snapshot:newItem,cihazAdi:cihaz});
  }
  DB.set('referans',items);
  closeModal('ref-modal');renderRefTable();toast('Kaydedildi','success');
}

function formatFileSize(bytes){
  if(!bytes) return '';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function addPersonelBelge(katId, input){
  if(!_editPersonelId){ toast('Önce personeli kaydedin','error'); return; }
  const files = Array.from(input.files);
  if(!files.length) return;

  const persons = DB.get('personeller') || [];
  const pIdx = persons.findIndex(x => x.id === _editPersonelId);
  if(pIdx === -1) return;

  if(!persons[pIdx].belgeler) persons[pIdx].belgeler = {};
  if(!persons[pIdx].belgeler[katId]) persons[pIdx].belgeler[katId] = [];

  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e){
      persons[pIdx].belgeler[katId].push({
        name: file.name,
        size: file.size,
        tarih: new Date().toLocaleDateString('tr-TR'),
        data: e.target.result
      });
      loaded++;
      if(loaded === files.length){
        DB.set('personeller', persons);
        toast(loaded + ' dosya yüklendi', 'success');
        renderPersonelBelgeler();
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function deletePersonelBelge(katId, fileIdx){
  if(!_editPersonelId) return;
  const persons = DB.get('personeller') || [];
  const pIdx = persons.findIndex(x => x.id === _editPersonelId);
  if(pIdx === -1) return;
  persons[pIdx].belgeler[katId].splice(fileIdx, 1);
  DB.set('personeller', persons);
  toast('Dosya silindi', 'success');
  renderPersonelBelgeler();
}

function downloadPersonelBelge(katId, fileIdx, personId){
  const pid = personId || _editPersonelId;
  if(!pid) return;
  const persons = DB.get('personeller') || [];
  const p = persons.find(x => x.id === pid);
  if(!p || !p.belgeler || !p.belgeler[katId]) return;
  const f = p.belgeler[katId][fileIdx];
  if(!f) return;
  const a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Email tag fonksiyonları
let _emailTags = [];
function addEmailTag(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val=document.getElementById('s-email-input').value.trim().replace(',','');
    if(val&&val.includes('@')&&!_emailTags.includes(val)){
      _emailTags.push(val);
      refreshEmailTags();
    }
    document.getElementById('s-email-input').value='';
  }
}
function removeEmailTag(el, email){
  _emailTags=_emailTags.filter(e=>e!==email);
  refreshEmailTags();
}
function refreshEmailTags(){
  const container=document.getElementById('s-email-tags');
  if(!container) return;
  const input=document.getElementById('s-email-input');
  container.innerHTML='';
  _emailTags.forEach(email=>{
    const span=document.createElement('span');
    span.style.cssText='display:flex;align-items:center;gap:4px;background:rgba(0,212,170,.15);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:12px';
    span.innerHTML=email+'<span onclick="removeEmailTag(this)" data-email="'+email+'" style="cursor:pointer;margin-left:2px;opacity:.7">&#10005;</span>';
    span.querySelector('span').onclick=function(){ removeEmailTag(null,this.dataset.email); };
    container.appendChild(span);
  });
  container.appendChild(input);
  input.focus();
}

function backupData(){
  const data={};
  const keys=['documents','docRevisions','disKaynak','disKaynakRevisions','lak','lakHistory','pak','pakHistory','araKontrol','referans','referansHistory','uygunsuzluklar','uygunsuzlukHistory','personeller','settings','activityLog'];

  data._exportedAt=new Date().toISOString();data._version='1.0';
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`kys_yedek_${today()}.json`;a.click();

async function restoreData(inp){
  const file=inp.files[0];if(!file)return;
  const ok=await confirm('Mevcut veriler üzerine yazılacak. Emin misiniz?','Veri Yükle','Yükle','info');
  if(!ok){inp.value='';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const keys=['documents','docRevisions','disKaynak','disKaynakRevisions','lak','lakHistory','pak','pakHistory','araKontrol','referans','referansHistory','uygunsuzluklar','uygunsuzlukHistory','personeller','settings','activityLog'];
      keys.forEach(k=>{if(data[k]!==undefined)DB.set(k,data[k]);});
      toast('Yedek yüklendi, sayfa yenileniyor...','success');
      setTimeout(()=>location.reload(),1500);
    }catch{toast('Geçersiz yedek dosyası','error');}
  };
  reader.readAsText(file);
}

function renderUygTable(){
  const tbody=document.getElementById('uyg-tbody');if(!tbody)return;
  let items=DB.get('uygunsuzluklar')||[];
  const q=(document.getElementById('uyg-search')?.value||'').toLowerCase();
  const durum=document.getElementById('uyg-durum')?.value||'';
  const sort=document.getElementById('uyg-sort')?.value||'tarih';
  items=items.filter(x=>{
    if(q&&!(x.no?.toLowerCase().includes(q)||x.aciklama?.toLowerCase().includes(q)))return false;
    if(durum&&x.durum!==durum)return false;
    return true;
  });
  items.sort((a,b)=>{
    if(sort==='tarih') return (b.tarih||'').localeCompare(a.tarih||'');
    if(sort==='kapatma') return (b.kapatmaTarihi||'').localeCompare(a.kapatmaTarihi||'');
    if(sort==='no') return (a.no||'').localeCompare(b.no||'');
    return 0;
  });
  if(!items.length){tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><p>Uygunsuzluk bulunamadı</p></div></td></tr>`;return;}
  const durumBadge={Açık:'badge-red','Devam Ediyor':'badge-amber',Kapatıldı:'badge-green'};
  tbody.innerHTML=items.map(x=>`<tr>
    <td class="strong">${x.no||'-'}</td>
    <td style="max-width:220px">${truncate(x.aciklama,50)}</td>
    <td>${formatDate(x.tarih)}</td>
    <td>${canEdit('uygunsuzluklar')?`<select class="tb-select" style="padding:3px 6px;font-size:11.5px" onchange="updateUygDurum('${x.id}',this.value)">
      <option ${x.durum==='Açık'?'selected':''}>Açık</option>
      <option ${x.durum==='Devam Ediyor'?'selected':''}>Devam Ediyor</option>
      <option ${x.durum==='Kapatıldı'?'selected':''}>Kapatıldı</option>
    </select>`:`<span class="badge ${durumBadge[x.durum]||'badge-gray'}">${x.durum||'-'}</span>`}</td>
    <td>${x.durum==='Kapatıldı'?formatDate(x.kapatmaTarihi):'-'}</td>
    <td><div class="action-btns">
      ${canEdit('uygunsuzluklar')?`<button class="icon-btn" title="PDF Yükle" onclick="uploadUygFile('${x.id}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">PDF</span></button>`:''}
      ${x.pdfFile?`<button class="icon-btn" title="PDF Önizle" onclick="previewUygFile('${x.id}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('eye',12)}</button>`:''}
      ${canEdit('uygunsuzluklar')?`<button class="icon-btn" title="Word/Excel Yükle" onclick="uploadUygFile('${x.id}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">W/E</span></button>`:''}
      ${x.officeFile?`<button class="icon-btn" title="Word/Excel Önizle/İndir" onclick="previewUygFile('${x.id}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('eye',12)}</button>`:''}
    </div></td>
    <td><div class="action-btns">
      ${canEdit('uygunsuzluklar')?`<button class="icon-btn" title="Düzenle" onclick="openUygModal('${x.id}')">${icon('edit',13)}</button>`:''}
      ${canEdit('uygunsuzluklar')?`<button class="icon-btn danger" title="Sil" onclick="deleteUyg('${x.id}')">${icon('trash',13)}</button>`:''}
    </div></td>
  </tr>`).join('');
}

function updateUygDurum(id,val){
  const items=DB.get('uygunsuzluklar')||[];
  const i=items.findIndex(x=>x.id===id);
  if(i<0)return;
  const old=items[i].durum;
  items[i].durum=val;
  if(val==='Kapatıldı'&&!items[i].kapatmaTarihi) items[i].kapatmaTarihi=today();
  DB.set('uygunsuzluklar',items);
  const u=getActiveUser();
  logHistory('uygunsuzlukHistory',{actionType:'status_change',itemId:id,user:u?`${u.ad} ${u.soyad}`:'',changes:{old,new:val},snapshot:{...items[i]},cihazAdi:items[i].no});
  renderUygTable();
  toast('Durum güncellendi','success');
}

async function deleteUyg(id){
  const ok=await confirm('Bu uygunsuzluk silinecek. Emin misiniz?');
  if(!ok)return;
  const items=DB.get('uygunsuzluklar')||[];
  const x=items.find(i=>i.id===id);
  const u=getActiveUser();
  logHistory('uygunsuzlukHistory',{actionType:'delete',itemId:id,user:u?`${u.ad} ${u.soyad}`:'',snapshot:x,cihazAdi:x?.no});
  DB.set('uygunsuzluklar',items.filter(i=>i.id!==id));
  toast('Silindi','success');
  renderUygTable();
}

function uploadUygFile(id, fileType){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept=fileType==='pdf'?'application/pdf':'.doc,.docx,.xls,.xlsx';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const items=DB.get('uygunsuzluklar')||[];
      const i=items.findIndex(x=>x.id===id);if(i<0)return;
      const u=getActiveUser();
      if(fileType==='pdf') items[i].pdfFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      else items[i].officeFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      DB.set('uygunsuzluklar',items);
      logHistory('uygunsuzlukHistory',{actionType:'file_upload',itemId:id,user:u?`${u.ad} ${u.soyad}`:'',changes:{old:'',new:f.name},snapshot:{...items[i]},cihazAdi:items[i].no});
      renderUygTable();
      toast(`${fileType==='pdf'?'PDF':'Word/Excel'} yüklendi: ${f.name}`,'success');
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function previewUygFile(id, fileType){
  const item=(DB.get('uygunsuzluklar')||[]).find(x=>x.id===id);
  if(!item)return;
  const file=fileType==='pdf'?item.pdfFile:item.officeFile;
  if(!file){toast('Dosya bulunamadı','error');return;}
  previewFile(file);
}

let _editUygId=null;
function openUygModal(id){
  _editUygId=id;
  document.getElementById('uyg-modal-title').textContent=id?'Uygunsuzluk Düzenle':'Uygunsuzluk Ekle';
  if(id){
    const x=(DB.get('uygunsuzluklar')||[]).find(x=>x.id===id);if(!x)return;
    document.getElementById('u-no').value=x.no||'';
    document.getElementById('u-aciklama').value=x.aciklama||'';
    document.getElementById('u-tarih').value=x.tarih||'';
    document.getElementById('u-durum').value=x.durum||'Açık';
    document.getElementById('u-kapatma').value=x.kapatmaTarihi||'';
  } else {
    document.getElementById('u-no').value='';
    document.getElementById('u-aciklama').value='';
    document.getElementById('u-tarih').value=today();
    document.getElementById('u-durum').value='Açık';
    document.getElementById('u-kapatma').value='';
  }
  openModal('uyg-modal');
}

function saveUyg(){
  const no=document.getElementById('u-no').value.trim();
  const aciklama=document.getElementById('u-aciklama').value.trim();
  if(!no||!aciklama){toast('Numara ve açıklama zorunlu','error');return;}
  const items=DB.get('uygunsuzluklar')||[];
  const u=getActiveUser();
  const data={no,aciklama,tarih:document.getElementById('u-tarih').value,durum:document.getElementById('u-durum').value,kapatmaTarihi:document.getElementById('u-kapatma').value};
  if(_editUygId){
    const i=items.findIndex(x=>x.id===_editUygId);
    if(i>=0){
      logHistory('uygunsuzlukHistory',{actionType:'update',itemId:_editUygId,user:u?`${u.ad} ${u.soyad}`:'',snapshot:{...items[i],...data},cihazAdi:no});
      items[i]={...items[i],...data};
    }
  } else {
    const newItem={id:uid(),...data,createdAt:new Date().toISOString()};
    items.push(newItem);
    logHistory('uygunsuzlukHistory',{actionType:'create',itemId:newItem.id,user:u?`${u.ad} ${u.soyad}`:'',snapshot:newItem,cihazAdi:no});
  }
  DB.set('uygunsuzluklar',items);
  closeModal('uyg-modal');
  renderUygTable();
  toast('Uygunsuzluk kaydedildi','success');
}

      ${canEdit('disKaynak')?`<div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="openImportDKExcel()">${icon('upload',14)} Excel ile İçe Aktar</button><button class="btn btn-primary" onclick="openDKModal()">${icon('plus',14)} Döküman Ekle</button></div>`:`<button class="btn btn-ghost" disabled>${icon('plus',14)} Döküman Ekle</button>`}
    </div>
    <div class="toolbar">
      <div class="tb-search"><svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="dk-search" type="text" placeholder="Standart no veya adı ara..." oninput="renderDKTable()">
      </div>
      <select class="tb-select" id="dk-filter-durum" onchange="renderDKTable()">
        <option value="">Tüm Durumlar</option>
        <option>Aktif</option>
        <option>Taslak</option>
        <option>Güncel</option>
        <option>Güncellenecek</option>
        <option>İptal</option>
        <option>Arşiv</option>
      </select>
      <select class="tb-select" id="dk-sort" onchange="renderDKTable()">
        <option value="yayim">Yayın Tarihi</option>
        <option value="no">Standart No</option>
        <option value="durum">Durum</option>
      </select>
    </div>
    <div class="table-wrap"><table>
      <thead id="dk-thead-el"><tr></tr></thead>
      <tbody id="dk-tbody"></tbody>
    </table></div>
  </div>`;
  addDKModal();
  renderDKTable();
}

function getDKFiltered(){
  const docs=DB.get('disKaynak')||[];
  const q=(document.getElementById('dk-search')?.value||'').toLowerCase();
  const durum=document.getElementById('dk-filter-durum')?.value||'';
  const sort=document.getElementById('dk-sort')?.value||'yayim';
  let filtered=docs.filter(d=>{
    if(q&&!(d.no?.toLowerCase().includes(q)||d.ad?.toLowerCase().includes(q)))return false;
    if(durum&&d.durum!==durum)return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='yayim') return (b.yayimTarihi||'').localeCompare(a.yayimTarihi||'');
    if(sort==='no') return (a.no||'').localeCompare(b.no||'');
    if(sort==='durum') return (a.durum||'').localeCompare(b.durum||'');
    return 0;
  });
  return filtered;
}

function renderDKTable(){
  const tbody=document.getElementById('dk-tbody');if(!tbody)return;
  let docs=getDKFiltered();
  const dkTheadEl=document.getElementById('dk-thead-el');
  if(dkTheadEl){
    const dkCols=[
      {key:'no',label:'Standart No'},
      {key:'ad',label:'Standart Adı'},
      {key:'yayimTarihi',label:'Yayın Tarihi'},
      {key:'durum',label:'Durum'},
      {key:'not',label:'Notlar'},
      {key:'__islemler',label:'Dosyalar'},
      {key:'__islemler2',label:'İşlemler'},
    ];
    dkTheadEl.innerHTML=buildSortThead('dk', dkCols);
  }
  docs=applySortToItems('dk', docs);
  if(!docs.length){tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><p>Döküman bulunamadı</p></div></td></tr>`;return;}
  tbody.innerHTML=docs.map(d=>`<tr>
    <td class="strong">${d.no||'-'}</td>
    <td class="strong">${truncate(d.ad,40)}</td>
    <td>${formatDate(d.yayimTarihi)}</td>
    <td>
      ${canEdit('disKaynak')?`<select class="tb-select" style="padding:3px 6px;font-size:11.5px" onchange="updateDKDurum('${d.id}',this.value)">
        ${['Aktif','Taslak','Güncel','Güncellenecek','İptal','Arşiv'].map(s=>`<option ${d.durum===s?'selected':''}>${s}</option>`).join('')}
      </select>`:`<span class="badge ${DK_STATUS_COLORS[d.durum]||'badge-gray'}">${d.durum||'-'}</span>`}
    </td>
    <td style="max-width:160px;color:var(--text3)">${truncate(d.not,35)}</td>
    <td><div class="action-btns">
      ${canEdit('disKaynak')?`<button class="icon-btn" title="PDF Yükle" onclick="uploadDKFile('${d.id}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">PDF</span></button>`:''}
      ${d.pdfFile?`<button class="icon-btn" title="PDF Önizle" onclick="previewDKFile('${d.id}','pdf')" style="color:var(--danger);border-color:rgba(240,82,82,.2)">${icon('eye',12)}</button>`:''}
      ${canEdit('disKaynak')?`<button class="icon-btn" title="Word/Excel Yükle" onclick="uploadDKFile('${d.id}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('upload',12)}<span style="font-size:10px;margin-left:2px">W/E</span></button>`:''}
      ${d.officeFile?`<button class="icon-btn" title="Word/Excel Önizle/İndir" onclick="previewDKFile('${d.id}','office')" style="color:var(--accent);border-color:rgba(0,212,170,.2)">${icon('eye',12)}</button>`:''}
    </div></td>
    <td><div class="action-btns">
      ${canEdit('disKaynak')?`<button class="icon-btn" title="Düzenle" onclick="openDKModal('${d.id}')">${icon('edit',13)}</button>`:''}
      ${canEdit('disKaynak')?`<button class="icon-btn" title="Revize Et" onclick="openDKRevizeModal('${d.id}')">${icon('rotate-ccw',13)}</button>`:''}
      ${canEdit('disKaynak')?`<button class="icon-btn danger" title="Sil" onclick="deleteDK('${d.id}')">${icon('trash',13)}</button>`:''}
    </div></td>
  </tr>`).join('');
}

function updateDKDurum(id,val){
  const docs=DB.get('disKaynak')||[];
  const i=docs.findIndex(d=>d.id===id);if(i<0)return;
  const old=docs[i].durum;
  docs[i].durum=val;
  DB.set('disKaynak',docs);
  const u=getActiveUser();
  logDKHistory('status_change',id,{old,new:val},{...docs[i]});
  renderDKTable();
  toast('Durum güncellendi','success');
}

async function deleteDK(id){
  const ok=await confirm('Bu döküman silinecek. Emin misiniz?');
  if(!ok)return;
  const docs=DB.get('disKaynak')||[];
  const d=docs.find(x=>x.id===id);
  const u=getActiveUser();
  logDKHistory('delete',id,null,d);
  DB.set('disKaynak',docs.filter(x=>x.id!==id));
  renderDKTable();
  toast('Döküman silindi','success');
}

function uploadDKFile(id,fileType){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept=fileType==='pdf'?'application/pdf':'.doc,.docx,.xls,.xlsx';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const docs=DB.get('disKaynak')||[];
      const i=docs.findIndex(x=>x.id===id);if(i<0)return;
      if(fileType==='pdf') docs[i].pdfFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      else docs[i].officeFile={name:f.name,size:f.size,data:ev.target.result,type:f.type};
      DB.set('disKaynak',docs);
      logDKHistory('file_upload',id,{old:'',new:f.name},{...docs[i]});
      renderDKTable();
      toast(`${fileType==='pdf'?'PDF':'Word/Excel'} yüklendi: ${f.name}`,'success');
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function previewDKFile(id,fileType){
  const doc=(DB.get('disKaynak')||[]).find(x=>x.id===id);if(!doc)return;
  const file=fileType==='pdf'?doc.pdfFile:doc.officeFile;
  if(!file){toast('Dosya bulunamadı','error');return;}
  previewFile(file);
}

function logDKHistory(actionType,itemId,changes,snapshot){
  const u=getActiveUser();
  logHistory('disKaynakRevisions',{actionType,itemId,user:u?`${u.ad} ${u.soyad}`:'Sistem',changes,snapshot});
}

  const div=document.createElement('div');
  div.innerHTML=`
  <div class="modal-overlay" id="dk-modal">
    <div class="modal"><div class="modal-header"><div class="modal-title" id="dk-modal-title">Döküman Ekle</div><div class="modal-close" onclick="closeModal('dk-modal')">${icon('x-circle',16)}</div></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Standart No</label><input id="dk-no" type="text" placeholder="ör. ISO/IEC 17025:2017"></div>
        <div class="form-group"><label>Yayın Tarihi</label><input id="dk-yayim" type="date"></div>
      </div>
      <div class="form-group"><label>Standart Adı</label><input id="dk-ad" type="text" placeholder="Standart adını girin"></div>
      <div class="form-group"><label>Durum</label>
        <select id="dk-durum">
          <option>Aktif</option><option>Taslak</option><option>Güncel</option>
          <option>Güncellenecek</option><option>İptal</option><option>Arşiv</option>
        </select>
      </div>
      <div class="form-group"><label>Notlar</label><textarea id="dk-not" placeholder="Açıklama..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('dk-modal')">İptal</button><button class="btn btn-primary" onclick="saveDK()">Kaydet</button></div>
    </div>
  </div>
  <div class="modal-overlay" id="dk-revize-modal">
    <div class="modal"><div class="modal-header"><div class="modal-title">Revize Et</div><div class="modal-close" onclick="closeModal('dk-revize-modal')">${icon('x-circle',16)}</div></div>
    <div class="modal-body">
      <div id="dk-revize-info" style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px;font-size:13px;color:var(--text2)"></div>
      <div class="form-group"><label>Yeni Yayın Tarihi</label><input id="dkrv-tarih" type="date"></div>
      <div class="form-group"><label>Revizyon Notu</label><textarea id="dkrv-not" placeholder="Güncelleme sebebini açıklayın..."></textarea></div>
    </div>
