let _editDKId=null;
function openDKModal(id=null){
  _editDKId=id;
  if(id){
    const doc=(DB.get('disKaynak')||[]).find(d=>d.id===id);if(!doc)return;
    document.getElementById('dk-modal-title').textContent='Döküman Düzenle';
    document.getElementById('dk-no').value=doc.no||'';
    document.getElementById('dk-ad').value=doc.ad||'';
    document.getElementById('dk-yayim').value=doc.yayimTarihi||'';
    document.getElementById('dk-durum').value=doc.durum||'Aktif';
    document.getElementById('dk-not').value=doc.not||'';
  } else {
    document.getElementById('dk-modal-title').textContent='Döküman Ekle';
    ['dk-no','dk-ad','dk-not'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('dk-yayim').value=today();
    document.getElementById('dk-durum').value='Aktif';
  }
  openModal('dk-modal');
}

function saveDK(){
  const no=document.getElementById('dk-no').value.trim();
  const ad=document.getElementById('dk-ad').value.trim();
  if(!no||!ad){toast('Standart no ve adı zorunlu','error');return;}
  const docs=DB.get('disKaynak')||[];
  const data={no,ad,yayimTarihi:document.getElementById('dk-yayim').value,durum:document.getElementById('dk-durum').value,not:document.getElementById('dk-not').value};
  if(_editDKId){
    const i=docs.findIndex(d=>d.id===_editDKId);
    if(i>=0){logDKHistory('update',_editDKId,null,{...docs[i],...data});docs[i]={...docs[i],...data};}
  } else {
    const newDoc={id:uid(),...data,createdAt:new Date().toISOString()};
    docs.push(newDoc);
    logDKHistory('create',newDoc.id,null,newDoc);
  }
  DB.set('disKaynak',docs);
  closeModal('dk-modal');
  renderDKTable();
  toast('Döküman kaydedildi','success');
}

let _dkRevizeId=null;
function openDKRevizeModal(id){
  _dkRevizeId=id;
  const doc=(DB.get('disKaynak')||[]).find(d=>d.id===id);if(!doc)return;
  document.getElementById('dk-revize-info').innerHTML=`<b>${doc.no}</b> — ${doc.ad}<br>Mevcut Yayın Tarihi: <b>${formatDate(doc.yayimTarihi)||'-'}</b>`;
  document.getElementById('dkrv-tarih').value=today();
  document.getElementById('dkrv-not').value='';
  openModal('dk-revize-modal');
}

function saveDKRevize(){
  const docs=DB.get('disKaynak')||[];
  const revs=DB.get('disKaynakRevisions')||[];
  const i=docs.findIndex(d=>d.id===_dkRevizeId);if(i<0)return;
  const u=getActiveUser();
  const old={...docs[i]};
  const yeniTarih=document.getElementById('dkrv-tarih').value;
  const not=document.getElementById('dkrv-not').value;
  docs[i].yayimTarihi=yeniTarih;
  docs[i].durum='Güncel';
  revs.unshift({id:uid(),ts:new Date().toISOString(),actionType:'revize',itemId:_dkRevizeId,user:u?`${u.ad} ${u.soyad}`:'Sistem',changes:{old:old.yayimTarihi,new:yeniTarih},snapshot:{...docs[i]},not,docNo:docs[i].no,docAd:docs[i].ad});
  DB.set('disKaynak',docs);
  DB.set('disKaynakRevisions',revs);
  closeModal('dk-revize-modal');
  renderDKTable();
  toast('Döküman revize edildi','success');
}

// ==================== DIŞ KAYNAK GEÇMİŞİ ====================
function renderDisKaynakGecmisi(){
  if(!canView('disKaynak')){document.getElementById('content').innerHTML='<div class="empty-state"><p>Bu modülü görüntüleme yetkiniz yok.</p></div>';return;}
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page">
    <div class="section-header"><div class="section-title">Dış Kaynak Geçmişi</div></div>
    <div class="toolbar">
      <div class="tb-search"><svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="dkh-search" type="text" placeholder="Standart no, kullanıcı ara..." oninput="renderDKHistTable()">
      </div>
      <select class="tb-select" id="dkh-action" onchange="renderDKHistTable()">
        <option value="">Tüm İşlemler</option>
        <option value="create">Oluşturuldu</option>
        <option value="update">Güncellendi</option>
        <option value="revize">Revize Edildi</option>
        <option value="status_change">Durum Değişti</option>
        <option value="delete">Silindi</option>
        <option value="file_upload">Dosya Yüklendi</option>
      </select>
      <input class="tb-select" id="dkh-d1" type="date" onchange="renderDKHistTable()" style="padding:7px 10px">
      <input class="tb-select" id="dkh-d2" type="date" onchange="renderDKHistTable()" style="padding:7px 10px">
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Tarih/Saat</th><th>Kullanıcı</th><th>Standart No</th><th>Standart Adı</th><th>İşlem</th><th>Değişiklik</th></tr></thead>
      <tbody id="dkh-tbody"></tbody>
    </table></div>
  </div>`;
  renderDKHistTable();
}

function renderDKHistTable(){
  const tbody=document.getElementById('dkh-tbody');if(!tbody)return;
  let hist=DB.get('disKaynakRevisions')||[];
  const q=(document.getElementById('dkh-search')?.value||'').toLowerCase();
  const act=document.getElementById('dkh-action')?.value||'';
  const d1=document.getElementById('dkh-d1')?.value||'';
  const d2=document.getElementById('dkh-d2')?.value||'';
  hist=hist.filter(h=>{
    if(act&&h.actionType!==act)return false;
    if(d1&&h.ts<d1)return false;
    if(d2&&h.ts>d2+'T23:59')return false;
    if(q&&!JSON.stringify(h).toLowerCase().includes(q))return false;
    return true;
  });
  const actionLabels={create:'Oluşturuldu',update:'Güncellendi',revize:'Revize Edildi',status_change:'Durum Değişti',delete:'Silindi',file_upload:'Dosya Yüklendi'};
  const actionColors={create:'badge-green',update:'badge-blue',revize:'badge-purple',status_change:'badge-amber',delete:'badge-red',file_upload:'badge-teal'};
  if(!hist.length){tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><p>Geçmiş bulunamadı</p></div></td></tr>`;return;}
  tbody.innerHTML=hist.map(h=>`<tr>
    <td>${new Date(h.ts).toLocaleString('tr-TR')}</td>
    <td class="strong">${h.user||'-'}</td>
    <td>${h.snapshot?.no||h.docNo||'-'}</td>
    <td>${truncate(h.snapshot?.ad||h.docAd||'-',30)}</td>
    <td><span class="badge ${actionColors[h.actionType]||'badge-gray'}">${actionLabels[h.actionType]||h.actionType}</span></td>
    <td style="font-size:12px;color:var(--text3)">${
      h.actionType==='revize'?`Yayın tarihi: ${formatDate(h.changes?.old)||'-'} → ${formatDate(h.changes?.new)||'-'}${h.not?` — ${truncate(h.not,30)}`:''}`:
      h.actionType==='status_change'?`${h.changes?.old||''} → ${h.changes?.new||''}`:
      h.actionType==='create'?'Yeni döküman eklendi':
      h.actionType==='file_upload'?`Dosya: ${h.changes?.new||''}`:
      h.actionType==='delete'?'Döküman silindi':'-'
    }</td>
  </tr>`).join('');
}

// ==================== INIT ====================
function applySettings(){
  const s=DB.get('settings')||{};
  if(s.firmName) document.getElementById('sidebar-firm-name').textContent=s.firmName;
  if(s.logo){
    const img=document.createElement('img');img.src=s.logo;img.style.cssText='width:32px;height:32px;border-radius:8px;object-fit:contain';
    const mark=document.querySelector('.logo-mark');if(mark){mark.innerHTML='';mark.appendChild(img);}
  }
  document.getElementById('topbar-firm').textContent=s.firmName||'';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

// ==================== LOGIN ====================
function showLogin(){
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex';
  // Firma adını güncelle
  const s = DB.get('settings');
  if(s && s.firmName){
    const el = document.getElementById('login-firm-name');
    if(el) el.textContent = s.firmName;
  }
  setTimeout(()=>{ document.getElementById('login-username').focus(); }, 100);
}

function hideLogin(){
  const ls = document.getElementById('login-screen');
  ls.style.display = 'none';
}

function doLogin(){
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if(!username || !password){
    errEl.textContent = 'Kullanıcı adı ve şifre gerekli';
    errEl.style.display = 'block';
    return;
  }

  const personeller = DB.get('personeller') || [];
  const user = personeller.find(p =>
    p.username === username && p.password === password && p.active !== false
  );

  if(!user){
    errEl.textContent = 'Kullanıcı adı veya şifre hatalı';
    errEl.style.display = 'block';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
    return;
  }

  // Başarılı giriş
  DB.set('aktifUser', user.id);
  sessionStorage.setItem('qms_session', user.id);
  hideLogin();
  updateUserDisplay();
  buildNav();
  navigate('dashboard');

  // Yönetici değilse user-pill tıklanamaz
  const pill = document.getElementById('user-pill-btn');
  if(pill) pill.onclick = user.rol === 'Yonetici' ? openUserSelect : null;
}

function doLogout(){
  sessionStorage.removeItem('qms_session');
  DB.set('aktifUser', null);
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  showLogin();
}

async function init(){
  // Önce API'den tüm veriyi yükle, sonra uygulamayı başlat
  const loading = document.getElementById('app-loading');
  if(loading) loading.style.display='flex';

  const msg = document.getElementById('app-loading-msg');
  if(msg) msg.textContent = 'Veritabanına bağlanıyor...';
  await DB.loadAll();
  if(msg) msg.textContent = 'Varsayılan veriler yükleniyor...';

  await DB.flushDefaults();
  if(msg) msg.textContent = 'Uygulama hazırlanıyor...';

  if(loading) loading.style.display='none';

  applySettings();

  // Session kontrolü - daha önce giriş yapıldı mı?
  const sessionUserId = sessionStorage.getItem('qms_session');
  const personeller = DB.get('personeller') || [];
  const sessionUser = sessionUserId ? personeller.find(p => p.id === sessionUserId) : null;

  if(sessionUser){
    // Oturum var, direkt gir
    DB.set('aktifUser', sessionUser.id);
    updateUserDisplay();
    buildNav();
    navigate('dashboard');
    // Yönetici değilse user-pill tıklanamaz
    const pill = document.getElementById('user-pill-btn');
    if(pill) pill.onclick = sessionUser.rol === 'Yonetici' ? openUserSelect : null;
  } else {
    // Oturum yok, login göster
    updateUserDisplay();
    buildNav();
    showLogin();
  }

  // Mobile check
  if(window.innerWidth<=768){
    document.getElementById('menu-toggle').style.display='flex';
  }
}

// Close sidebar on nav click (mobile)
document.getElementById('nav-menu').addEventListener('click',()=>{
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open');
});

// Click outside sidebar
document.addEventListener('click',e=>{
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=768&&sb.classList.contains('open')&&!sb.contains(e.target)&&e.target.id!=='menu-toggle'){
    sb.classList.remove('open');
  }
});

window.addEventListener('DOMContentLoaded',init);
</script>
